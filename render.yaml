services:
  - type: web
    name: pettech-care-center
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm run install:all && npm --prefix server run db:push && npm run seed && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
